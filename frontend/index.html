<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
/* ── Reset & Variables ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#f7f8fa;
  --bg-base:#ffffff;
  --bg-surface:rgba(255,255,255,0.9);
  --bg-card:rgba(243,244,246,0.8);
  --bg-card-hover:rgba(229,231,235,0.8);
  --border:rgba(0,0,0,0.08);
  --border-active:rgba(79,140,255,0.4);
  --text-primary:#1a1a2e;
  --text-secondary:#6b7280;
  --text-muted:#9ca3af;
  --accent:#4f8cff;
  --accent-glow:rgba(79,140,255,0.1);
  --mike:#4f8cff;--alice:#e84393;--bob:#7c3aed;
  --alex:#ea580c;--dana:#059669;--eve:#d97706;--david:#0d9488;
  --radius:14px;
  --radius-sm:10px;
  --font-body:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --left-width:260px;
  --right-width:0px;
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);color:var(--text-primary);
  background:var(--bg-deep);height:100vh;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(79,140,255,0.04),transparent),
    radial-gradient(ellipse 60% 50% at 80% 80%,rgba(167,139,250,0.03),transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(52,211,153,0.02),transparent);
}
/* ── App Shell ──────────────────────────────────────────────────── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
/* ── Header ─────────────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);background:rgba(255,255,255,0.85);flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),#7c5cfc);
  display:grid;place-items:center;
  box-shadow:0 2px 8px rgba(79,140,255,0.25);
}
.brand-icon svg{width:16px;height:16px;fill:#fff}
.brand-name{font-size:1.05rem;font-weight:700;letter-spacing:-0.02em}
.header-right{display:flex;align-items:center;gap:14px}
.conn-status{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-secondary)}
.conn-dot{
  width:7px;height:7px;border-radius:50%;background:#ef4444;
  box-shadow:0 0 8px rgba(239,68,68,0.5);transition:all 0.4s;
}
.conn-dot.on{background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,0.5)}
.toggle-btn{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--text-secondary);padding:5px 10px;font-size:0.72rem;
  cursor:pointer;font-family:var(--font-body);transition:all 0.2s;
}
.toggle-btn:hover{border-color:var(--accent);color:var(--text-primary)}
.toggle-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
/* ── 4-Column Layout ───────────────────────────────────────────── */
.main{
  display:grid;
  grid-template-columns:var(--left-width) 1fr 0px var(--right-width);
  flex:1;overflow:hidden;transition:grid-template-columns 0.3s ease;
}
.main.left-collapsed{grid-template-columns:0px 1fr 0px var(--right-width)}
.main.right-open{--right-width:50vw;grid-template-columns:var(--left-width) 1fr 5px var(--right-width)}
.main.left-collapsed.right-open{grid-template-columns:0px 1fr 5px var(--right-width)}
/* ── Resize Handle ─────────────────────────────────────────────── */
.resize-handle{
  width:5px;cursor:col-resize;background:transparent;
  transition:background 0.2s;position:relative;z-index:10;
}
.resize-handle:hover,.resize-handle.active{background:var(--accent)}
/* ── Left: Project List ─────────────────────────────────────────── */
.left-panel{
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  background:rgba(247,248,250,0.95);overflow:hidden;transition:opacity 0.3s;
}
.main.left-collapsed .left-panel{opacity:0;pointer-events:none}
.left-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.left-title{font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted)}
.project-list{flex:1;overflow-y:auto;padding:6px 8px}
.project-list::-webkit-scrollbar{width:3px}
.project-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.project-item{
  padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;
  margin-bottom:2px;transition:all 0.2s;
  position:relative;display:flex;align-items:flex-start;gap:4px;
}
.project-item:hover{background:var(--bg-card-hover)}
.project-item.active{background:var(--accent-glow);border:1px solid var(--border-active)}
.project-item .p-info{flex:1;min-width:0}
.project-item .p-name{font-size:0.82rem;font-weight:500;color:var(--text-primary);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-item .p-time{font-size:0.68rem;color:var(--text-muted);font-family:var(--font-mono)}
.project-item .p-status{font-size:0.65rem;color:var(--accent)}
.project-item .p-status.done{color:var(--dana)}
.project-item .p-status.error{color:#ef4444}
.p-menu-btn{
  flex-shrink:0;width:22px;height:22px;border:none;background:none;
  cursor:pointer;border-radius:4px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  opacity:0;transition:opacity 0.15s,background 0.15s;
}
.project-item:hover .p-menu-btn,.p-menu-btn.open{opacity:1}
.p-menu-btn:hover{background:var(--bg-card-hover)}
.p-menu-btn span{display:block;width:3px;height:3px;border-radius:50%;background:var(--text-secondary)}
.p-context-menu{
  position:fixed;z-index:1000;min-width:120px;
  background:var(--bg-base);border:1px solid var(--border);
  border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);
  padding:4px;display:none;
}
.p-context-menu.show{display:block}
.p-context-menu-item{
  padding:7px 12px;font-size:0.78rem;border-radius:5px;cursor:pointer;
  color:var(--text-primary);transition:background 0.1s;
}
.p-context-menu-item:hover{background:var(--bg-card-hover)}
.p-context-menu-item.danger{color:#ef4444}
.p-context-menu-item.danger:hover{background:rgba(239,68,68,0.08)}
.new-project-btn{
  margin:8px;padding:10px;border-radius:var(--radius-sm);
  border:1px dashed var(--border);background:none;
  color:var(--text-secondary);font-size:0.82rem;cursor:pointer;
  font-family:var(--font-body);transition:all 0.2s;
}
.new-project-btn:hover{border-color:var(--accent);color:var(--accent)}
/* ── Center: Chat Area ──────────────────────────────────────────── */
.chat-col{display:flex;flex-direction:column;overflow:hidden}
.chat-scroll{
  flex:1;overflow-y:auto;padding:20px 24px;scroll-behavior:smooth;
  display:flex;flex-direction:column;
}
.chat-scroll::-webkit-scrollbar{width:4px}
.chat-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-msg{display:flex;gap:10px;margin-bottom:14px;animation:msgIn 0.3s ease both;max-width:85%}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.chat-msg.role{align-self:flex-start}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-msg.system{align-self:center;max-width:70%}
.chat-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;font-size:0.7rem;font-weight:700;color:#fff;
}
.chat-bubble{
  padding:10px 14px;border-radius:14px;font-size:0.84rem;line-height:1.55;
  word-break:break-word;white-space:pre-wrap;
}
.chat-msg.role .chat-bubble{background:#f3f4f6;border:1px solid var(--border);border-top-left-radius:4px}
.chat-msg.user .chat-bubble{background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border-top-right-radius:4px}
.chat-msg.system .chat-bubble{background:rgba(107,114,128,0.08);color:var(--text-secondary);font-size:0.78rem;text-align:center;border-radius:8px}
.chat-sender{font-size:0.7rem;font-weight:600;margin-bottom:3px}
.chat-time{font-size:0.62rem;color:var(--text-muted);margin-top:4px;font-family:var(--font-mono)}
.chat-bubble pre{background:rgba(0,0,0,0.04);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin:6px 0;overflow-x:auto;font-family:var(--font-mono);font-size:0.78rem}
.chat-bubble code{font-family:var(--font-mono);font-size:0.8rem;background:rgba(0,0,0,0.05);padding:1px 5px;border-radius:3px}
.chat-bubble pre code{background:none;padding:0}
/* ── Thinking Indicator ──────────────────────────────────────────── */
.thinking-indicator{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:14px;background:#f3f4f6;
  border:1px solid var(--border);font-size:0.78rem;color:var(--text-secondary);
  cursor:pointer;margin-bottom:14px;
}
.thinking-dots span{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--accent);animation:dotPulse 1.4s ease infinite;
}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.thinking-content{
  display:none;margin-top:6px;padding:8px;border-radius:6px;
  background:rgba(0,0,0,0.03);font-family:var(--font-mono);font-size:0.75rem;
  color:var(--text-secondary);white-space:pre-wrap;word-break:break-all;
  max-height:150px;overflow-y:auto;
}
.thinking-indicator.expanded .thinking-content{display:block}
/* ── Input Area ─────────────────────────────────────────────────── */
.input-area{
  padding:12px 20px 16px;border-top:1px solid var(--border);
  background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;gap:10px;flex-shrink:0;
}
.input-area textarea{
  flex:1;padding:10px 14px;border-radius:var(--radius-sm);
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--text-primary);font-family:var(--font-body);font-size:0.88rem;
  outline:none;resize:none;min-height:42px;max-height:120px;
  line-height:1.5;transition:border-color 0.2s;
}
.input-area textarea:focus{border-color:var(--accent)}
.input-area textarea::placeholder{color:var(--text-muted)}
.send-btn{
  padding:10px 20px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent),#7c5cfc);
  color:#fff;font-family:var(--font-body);font-size:0.85rem;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:opacity 0.2s,transform 0.1s;flex-shrink:0;
}
.send-btn:hover{opacity:0.9;transform:translateY(-1px)}
.send-btn:active{transform:translateY(0)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
/* ── Right Panel ───────────────────────────────────────────────── */
.right-panel{
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);background:rgba(247,248,250,0.95);
  overflow:hidden;transition:opacity 0.3s;
}
.main:not(.right-open) .right-panel{opacity:0;pointer-events:none;width:0}
.right-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.right-panel-title{font-size:0.82rem;font-weight:600;color:var(--text-secondary)}
.right-panel-close{
  background:none;border:none;color:var(--text-muted);font-size:1.2rem;
  cursor:pointer;padding:2px 6px;border-radius:4px;transition:all 0.15s;
}
.right-panel-close:hover{color:var(--text-primary);background:var(--bg-card-hover)}
/* ── App Viewer ────────────────────────────────────────────────── */
.app-viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.app-viewer iframe{flex:1;width:100%;border:none;background:#fff}
.app-viewer-msg{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:0.88rem;text-align:center;padding:20px;
  background:#f7f8fa;
}
/* ── Code Editor ───────────────────────────────────────────────── */
.code-editor{
  flex:1;display:grid;grid-template-columns:180px 1fr;
  grid-template-rows:auto 1fr;overflow:hidden;
}
.editor-tabs{
  grid-column:2;grid-row:1;display:flex;align-items:center;
  overflow-x:auto;overflow-y:hidden;background:rgba(243,244,246,0.6);
  border-bottom:1px solid var(--border);min-height:0;
}
.editor-tabs::-webkit-scrollbar{height:2px}
.editor-tabs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.editor-tabs:empty{display:none}
.editor-tab{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  font-size:0.73rem;color:var(--text-secondary);cursor:pointer;
  border-right:1px solid var(--border);white-space:nowrap;
  transition:background 0.1s,color 0.1s;flex-shrink:0;
}
.editor-tab:hover{background:rgba(255,255,255,0.8);color:var(--text-primary)}
.editor-tab.active{background:#fff;color:var(--accent);font-weight:500;box-shadow:inset 0 -2px 0 var(--accent)}
.editor-tab .tab-close{
  width:16px;height:16px;border:none;background:none;cursor:pointer;
  border-radius:3px;font-size:0.7rem;color:var(--text-muted);
  display:grid;place-items:center;transition:all 0.1s;line-height:1;
}
.editor-tab .tab-close:hover{background:rgba(0,0,0,0.08);color:var(--text-primary)}
.file-tree{grid-row:1 / -1}
.file-tree{
  overflow-y:auto;border-right:1px solid var(--border);padding:8px 0;
  background:rgba(247,248,250,0.8);
}
.file-tree::-webkit-scrollbar{width:3px}
.file-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.file-tree-item{
  padding:4px 10px;font-size:0.75rem;cursor:pointer;
  color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:all 0.1s;display:flex;align-items:center;gap:4px;
}
.file-tree-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.file-tree-item.active{background:var(--accent-glow);color:var(--accent)}
.file-tree-item.dir{font-weight:500;color:var(--text-primary)}
.file-tree-item .arrow{
  display:inline-block;width:12px;text-align:center;font-size:0.6rem;
  transition:transform 0.15s;flex-shrink:0;
}
.file-tree-item .arrow.open{transform:rotate(90deg)}
.file-tree-children{display:none}
.file-tree-children.open{display:block}
.code-content{
  overflow:auto;padding:0;background:#ffffff;
}
.code-content pre{margin:0;padding:12px 16px;font-size:0.78rem;line-height:1.6}
.code-content code{font-family:var(--font-mono) !important}
.code-content .no-file{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--text-muted);font-size:0.85rem;
}
/* ── Empty state ────────────────────────────────────────────────── */
.chat-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;color:var(--text-muted);gap:10px;
}
.chat-empty svg{width:48px;height:48px;opacity:0.25}
.chat-empty p{font-size:0.88rem}
/* ── Responsive ─────────────────────────────────────────────────── */
@media(max-width:768px){
  .main{grid-template-columns:0px 1fr 0px 0px !important}
  .left-panel,.right-panel,.resize-handle{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <span class="brand-name">Code Forge</span>
    </div>
    <div class="header-right">
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">未连接</span>
      </div>
      <button class="toggle-btn" id="toggleLeft" onclick="toggleLeft()">项目列表</button>
      <button class="toggle-btn" id="btnViewer" onclick="openPreview('viewer')">应用查看器</button>
      <button class="toggle-btn" id="btnEditor" onclick="openPreview('editor')">代码编辑器</button>
    </div>
  </header>
  <div class="main" id="mainGrid">
    <div class="left-panel">
      <div class="left-header"><span class="left-title">项目</span></div>
      <div class="project-list" id="projectList"></div>
      <button class="new-project-btn" onclick="newProject()">+ 新建项目</button>
      <div class="p-context-menu" id="projectContextMenu">
        <div class="p-context-menu-item" onclick="renameProject()">重命名</div>
        <div class="p-context-menu-item danger" onclick="deleteProject()">删除</div>
      </div>
    </div>
    <div class="chat-col">
      <div class="chat-scroll" id="chatScroll">
        <div class="chat-empty" id="chatEmpty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          <p>输入需求，开始与 AI 团队协作</p>
        </div>
      </div>
      <div class="input-area">
        <textarea id="chatInput" rows="1" placeholder="输入你的需求，例如：制作一个打砖块游戏..."></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="right-panel" id="rightPanel">
      <div class="right-panel-header">
        <span class="right-panel-title" id="rightPanelTitle">预览</span>
        <button class="right-panel-close" onclick="closePreview()">&times;</button>
      </div>
      <div class="app-viewer" id="appViewer" style="display:none">
        <iframe id="previewIframe"></iframe>
        <div class="app-viewer-msg" id="viewerMsg" style="display:none"></div>
      </div>
      <div class="code-editor" id="codeEditor" style="display:none">
        <div class="file-tree" id="fileTree"></div>
        <div class="editor-tabs" id="editorTabs"></div>
        <div class="code-content" id="codeContent"><div class="no-file">选择文件查看代码</div></div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
